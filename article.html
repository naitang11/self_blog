<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章 - 散人的博客</title>
  <meta name="description" content="博客文章">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/github.min.css" id="hljs-light">
  <link rel="stylesheet" href="css/github-dark.min.css" id="hljs-dark" disabled>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/article.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
</head>
<body>
  <!-- 阅读进度条 -->
  <div class="progress-bar" id="progressBar"></div>

  <!-- 导航栏 -->
  <header class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-logo">
        <span class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"></path>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
          </svg>
        </span>
        <span class="logo-text">散人</span>
      </a>

      <div class="navbar-actions">
        <a href="index.html" class="back-btn" title="返回首页">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          <span>返回</span>
        </a>

        <button class="theme-toggle" id="themeToggle" title="切换主题">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- 文章主体 -->
  <main class="article-main">
    <div class="article-container">
      <!-- 文章内容 -->
      <article class="article-content" id="articleContent">
        <div class="article-header">
          <div class="article-tags" id="articleTags"></div>
          <h1 class="article-title" id="articleTitle">加载中...</h1>
          <div class="article-meta">
            <span class="meta-item" id="articleDate">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              <span></span>
            </span>
            <span class="meta-item" id="articleReadTime">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
              </svg>
              <span></span>
            </span>
          </div>
        </div>

        <div class="article-body" id="articleBody">
          <div class="loading-spinner">
            <div class="spinner"></div>
            <span>加载中...</span>
          </div>
        </div>

        <!-- 评论区 -->
        <section class="comments-section" id="commentsSection">
          <h2 class="comments-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            评论
            <span class="comments-count" id="commentsCount">(0)</span>
          </h2>

          <!-- 发表评论 -->
          <div class="comment-form">
            <textarea id="commentInput" placeholder="写下你的评论..." rows="3"></textarea>
            <div class="comment-form-footer">
              <input type="text" id="commentAuthor" placeholder="你的昵称" class="comment-author">
              <button class="comment-submit" id="commentSubmit">发表评论</button>
            </div>
          </div>

          <!-- 评论列表 -->
          <div class="comments-list" id="commentsList">
            <div class="comments-empty">还没有评论，来抢沙发吧！</div>
          </div>
        </section>
      </article>

      <!-- 侧边目录 -->
      <aside class="article-sidebar" id="articleSidebar">
        <div class="toc-container">
          <div class="toc-header">目录</div>
          <nav class="toc-nav" id="tocNav">
            <div class="toc-empty">加载中...</div>
          </nav>
        </div>
      </aside>
    </div>

    <!-- 上一篇/下一篇导航 -->
    <nav class="article-nav" id="articleNav">
      <a href="#" class="nav-prev" id="navPrev">
        <span class="nav-label">上一篇</span>
        <span class="nav-title" id="navPrevTitle"></span>
      </a>
      <a href="#" class="nav-next" id="navNext">
        <span class="nav-label">下一篇</span>
        <span class="nav-title" id="navNextTitle"></span>
      </a>
    </nav>
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-left">
        <span class="footer-logo">散人</span>
        <p class="footer-copy">© 2026 · 用 ❤️ 和 ☕ 构建</p>
      </div>
    </div>
  </footer>

  <!-- 返回顶部 -->
  <button class="back-to-top" id="backToTop" title="返回顶部">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>

  <script src="js/marked.min.js"></script>
<script>
if (typeof marked === 'undefined') {
  var script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';
  document.head.appendChild(script);
}
</script>
  <script src="js/highlight.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/article.js"></script>
</body>
</html>
